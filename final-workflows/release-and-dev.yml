# Production-ready replacement for kenobi-c2s' azure-build-deploy-dev.yml +
# azure-build-on-tag.yml. Single workflow on push:main with three jobs:
#
#   1. semantic-release       — analyzes commits since last tag; immediately tags +
#                                cuts GitHub Release + pushes chore(release) commit
#                                back to main. NO Release-PR step (this is the
#                                key behavioural difference vs release-please).
#   2. build-versioned-image  — gated on new_release_published; builds versioned
#                                image + tenant image with the version tag
#   3. build-and-deploy-dev   — runs in parallel; sha-tagged build + dev rollout
#                                + tenant-sha image
#
# build-and-deploy-dev intentionally has no `needs:` clause — dev rollouts are
# decoupled from release outcomes. semantic-release failures don't block dev.
#
# Per-job `permissions:` and `concurrency:` blocks preserve least-privilege +
# per-flow queueing semantics even though all three live in one file.
#
# AUTH NOTE: semantic-release pushes the chore(release) commit back to main.
# With branch protection enabled on `main` (which is the production case), the
# default GITHUB_TOKEN is rejected. Provide secrets.SR_GITHUB_TOKEN as a PAT
# or GitHub-App token with `contents: write` and bypass-protection on `main`.
# The workflow falls back to GITHUB_TOKEN if SR_GITHUB_TOKEN isn't set.

name: Release & Dev Deploy

on:
  push:
    branches:
      - main
      - develop                # prerelease channel (RC builds)
      - 'maintenance/**'       # release-branch hotfix pattern
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
  workflow_dispatch: {}

env:
  IMAGE_NAME: kenobi-c2s
  IMAGE_REPO: ${{ secrets.SHARED_ACR_SERVER }}/kenobi-c2s

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. semantic-release — runs on every push to main / develop / maintenance/*
  # ─────────────────────────────────────────────────────────────────────
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to create tags + GitHub releases + push back chore(release)
      issues: write         # @semantic-release/github comments on closed issues
      pull-requests: write  # @semantic-release/github comments on merged PRs
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: false  # never cancel a release mid-flight
    outputs:
      new_release_published: ${{ steps.sr.outputs.new_release_published }}
      new_release_version:   ${{ steps.sr.outputs.new_release_version }}
      new_release_git_tag:   ${{ steps.sr.outputs.new_release_git_tag }}
      new_release_major:     ${{ steps.sr.outputs.new_release_major_version }}
      new_release_minor:     ${{ steps.sr.outputs.new_release_minor_version }}
      new_release_patch:     ${{ steps.sr.outputs.new_release_patch_version }}
      new_release_channel:   ${{ steps.sr.outputs.new_release_channel }}
      new_release_notes:     ${{ steps.sr.outputs.new_release_notes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0           # semantic-release needs full history
          persist-credentials: false  # use SR_GITHUB_TOKEN explicitly via env

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release + plugins
        run: npm install --no-save

      - name: Run semantic-release
        id: sr
        uses: cycjimmy/semantic-release-action@v4
        env:
          # In production with branch protection on `main`, the default
          # GITHUB_TOKEN cannot push the chore(release) commit. Provide
          # SR_GITHUB_TOKEN as a PAT or App-installation token with
          # `contents: write` and bypass-protection on `main`.
          GITHUB_TOKEN: ${{ secrets.SR_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@8

  # ─────────────────────────────────────────────────────────────────────
  # 2. build-versioned-image — fires only when semantic-release cut a tag
  #    Replaces azure-build-on-tag.yml. Builds versioned base image AND
  #    tenant image (Nuitka) tagged with the new version.
  # ─────────────────────────────────────────────────────────────────────
  build-versioned-image:
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      version_tag: ${{ needs.semantic-release.outputs.new_release_git_tag }}
      version:     ${{ needs.semantic-release.outputs.new_release_version }}
      digest:      ${{ steps.digest.outputs.digest }}
      image_ref:   ${{ steps.digest.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Login to shared ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.SHARED_ACR_SERVER }}
          username: ${{ secrets.SHARED_ACR_USERNAME }}
          password: ${{ secrets.SHARED_ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      # build-args feed scripts/generate_build_info.py inside the Dockerfile.
      # The script needs GITHUB_REF in the `refs/tags/X.Y.Z` form to extract
      # the version (its primary path is `git describe --tags --exact-match
      # HEAD`, which works because `.git/` is in the docker build context per
      # the existing `.dockerignore`; the env var is the fallback).
      # The script's regex tolerates both `v1.2.3` and bare `1.2.3` — bare
      # semver tags from semantic-release (tagFormat: "${version}") produce
      # a bare-semver `version` field in build.json (e.g. `"version": "1.23.0"`).
      - name: Build & Push versioned image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GITHUB_REF=refs/tags/${{ needs.semantic-release.outputs.new_release_git_tag }}
            GITHUB_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ needs.semantic-release.outputs.new_release_git_tag }}
            ${{ env.IMAGE_REPO }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Resolve immutable digest
        id: digest
        run: |
          DIGEST=$(crane digest "$IMAGE_REPO:${{ needs.semantic-release.outputs.new_release_git_tag }}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REPO@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always()
        uses: crowdbotics/github-actions/slack-notify@master
        with:
          webhook_url: ${{ secrets.ARTIFACT_SLACK_WEBHOOK_URL }}
          title: "Versioned image built: ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.new_release_git_tag }}"
          emoji: "🏷️"
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          fields: |
            Version=${{ needs.semantic-release.outputs.new_release_git_tag }}
            Digest=${{ steps.digest.outputs.digest }}

  # ─────────────────────────────────────────────────────────────────────
  # 2b. build-versioned-tenant-image — Nuitka tenant build for the
  #     versioned base. Same chain pattern as kenobi-c2s today.
  # ─────────────────────────────────────────────────────────────────────
  build-versioned-tenant-image:
    needs: build-versioned-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TENANT_IMAGE_NAME:   kenobi-c2s-tenant
      ONTENANT_ACR_SERVER: ${{ vars.ONTENANT_ACR_SERVER || 'ontenant.azurecr.io' }}
      TENANT_IMAGE_REPO:   ${{ vars.ONTENANT_ACR_SERVER || 'ontenant.azurecr.io' }}/kenobi-c2s-tenant
      BASE_IMAGE_REF:      ${{ secrets.SHARED_ACR_SERVER }}/kenobi-c2s@${{ needs.build-versioned-image.outputs.digest }}
    outputs:
      tenant_digest: ${{ steps.tenant_digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-versioned-image.outputs.version_tag }}

      - name: Login to shared ACR (pull base image)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.SHARED_ACR_SERVER }}
          username: ${{ secrets.SHARED_ACR_USERNAME }}
          password: ${{ secrets.SHARED_ACR_PASSWORD }}

      - name: Login to OnTenant ACR (push tenant image)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ONTENANT_ACR_SERVER }}
          username: ${{ secrets.ONTENANT_ACR_USERNAME }}
          password: ${{ secrets.ONTENANT_ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & Push Tenant Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.tenant
          push: true
          build-args: |
            TENANT_BASE_IMAGE=${{ env.BASE_IMAGE_REF }}
            NUITKA_JOBS=4
            BUILD_PRIORITY=speed
            SKIP_COMPILATION_TEST=true
          tags: |
            ${{ env.TENANT_IMAGE_REPO }}:${{ needs.build-versioned-image.outputs.version_tag }}
            ${{ env.TENANT_IMAGE_REPO }}:latest
          provenance: false
          cache-from: type=gha,scope=tenant
          cache-to: type=gha,mode=max,scope=tenant

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Copy base image to OnTenant registry
        env:
          BASE_IMAGE_REPO: ${{ env.ONTENANT_ACR_SERVER }}/kenobi-c2s
        run: |
          set -euo pipefail
          echo "Copying base image to OnTenant registry..."
          crane copy "$BASE_IMAGE_REF" "$BASE_IMAGE_REPO:${{ needs.build-versioned-image.outputs.version_tag }}"
          crane copy "$BASE_IMAGE_REF" "$BASE_IMAGE_REPO:latest"
          echo "Base image copied successfully"

      - name: Resolve tenant image digest
        id: tenant_digest
        run: |
          DIGEST=$(crane digest "$TENANT_IMAGE_REPO:${{ needs.build-versioned-image.outputs.version_tag }}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always()
        uses: crowdbotics/github-actions/slack-notify@master
        with:
          webhook_url: ${{ secrets.ARTIFACT_SLACK_WEBHOOK_URL }}
          title: "Versioned tenant image ${{ job.status == 'success' && 'built' || 'failed' }}: ${{ env.TENANT_IMAGE_NAME }}:${{ needs.build-versioned-image.outputs.version_tag }}"
          emoji: ${{ job.status == 'success' && '🏢' || '❌' }}
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          fields: |
            Version=${{ needs.build-versioned-image.outputs.version_tag }}
            Tenant digest=${{ steps.tenant_digest.outputs.digest }}

  # ─────────────────────────────────────────────────────────────────────
  # 3. build-and-deploy-dev — runs on every main push (NO needs: clause)
  #    Mirrors azure-build-deploy-dev.yml. sha-tag build + dev rollout +
  #    tenant-sha image build chained at the end.
  # ─────────────────────────────────────────────────────────────────────
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    concurrency:
      group: build-and-deploy-dev-${{ github.ref }}
      cancel-in-progress: false  # never cancel a mid-helm-upgrade run
    environment:
      name: dev
    env:
      PRIMARY_TAG:      ${{ github.ref_name || github.event.repository.default_branch }}
      DEV_RELEASE_NAME: kenobi-c2s
      DEV_NAMESPACE:    ${{ vars.DEV_NAMESPACE || 'kenobi-c2s' }}
    outputs:
      sha7:         ${{ steps.vars.outputs.sha7 }}
      branch_tag:   ${{ steps.tag.outputs.tag }}
      image_digest: ${{ steps.digest.outputs.digest }}
      image_ref:    ${{ steps.digest.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Vars
        id: vars
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Friendly tag derived from the source branch of the merged PR.
      - name: Determine branch image tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_BRANCH="$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].head.ref' 2>/dev/null || true)"
          BR="$PR_BRANCH"
          if [ -z "$BR" ]; then BR="main"; fi

          RAW_TAG="$(echo "$BR" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g' | cut -c1-63)"
          if [ -z "$RAW_TAG" ]; then RAW_TAG="$PRIMARY_TAG"; fi

          TAG="$PRIMARY_TAG-$RAW_TAG"
          TAG="${TAG:0:63}"
          TAG="${TAG%-}"

          echo "Resolved branch -> $BR ; image tag -> $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to shared ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.SHARED_ACR_SERVER }}
          username: ${{ secrets.SHARED_ACR_USERNAME }}
          password: ${{ secrets.SHARED_ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      # build-args feed scripts/generate_build_info.py inside the Dockerfile.
      # On push to main, github.ref = `refs/heads/main` — the script falls
      # through to its branch+sha resolution path and produces a dev-style
      # version like `0.0.0-dev+main.abc1234` in build.json. Same as today.
      - name: Build & Push Docker Image (sha + branch tags)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GITHUB_REF=${{ github.ref }}
            GITHUB_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_REPO }}:sha-${{ steps.vars.outputs.sha7 }}
            ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_REPO }}:${{ env.PRIMARY_TAG }}
          load: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Resolve immutable digest
        id: digest
        run: |
          DIGEST=$(crane digest "$IMAGE_REPO:sha-${{ steps.vars.outputs.sha7 }}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REPO@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Update primary tag alias to latest digest
        run: crane tag "$IMAGE_REPO@${{ steps.digest.outputs.digest }}" "$PRIMARY_TAG"

      - uses: crowdbotics/github-actions/azure-k8s-auth@master
        with:
          AZURE_CREDENTIALS:   ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CLUSTER_NAME:  ${{ vars.AZURE_CLUSTER_NAME }}
          ACR_LOGIN_SERVER:    ${{ secrets.SHARED_ACR_SERVER }}
          ACR_USERNAME:        ${{ secrets.SHARED_ACR_USERNAME }}
          ACR_PASSWORD:        ${{ secrets.SHARED_ACR_PASSWORD }}
          NAMESPACE:           ${{ env.DEV_NAMESPACE }}

      - name: Clone deployment chart repository
        run: |
          git clone --single-branch --branch develop --depth 1 \
            https://${{ secrets.TOKEN }}@github.com/crowdbotics/project-deploy.git deployment

      - name: Helm deploy Dev
        env:
          VALUES_FILE: ${{ vars.HELM_VAR_FILE }}
          DIGEST:      ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          cd deployment/azure/helm-chart/kenobi-c2s/deployment-app

          helm dependency build

          VALUES_ARGS=(-f values.yaml)
          if [[ -n "$VALUES_FILE" ]]; then
            VALUES_ARGS+=(-f "$VALUES_FILE")
          fi

          helm upgrade --install "$DEV_RELEASE_NAME" . \
            "${VALUES_ARGS[@]}" \
            --namespace "$DEV_NAMESPACE" \
            --set image.repository="$IMAGE_REPO" \
            --set-string image.tag="$PRIMARY_TAG@$DIGEST" \
            --set secrets.SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --set secrets.AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --set secrets.AZURE_CONNECTION_STRING="${{ secrets.AZURE_CONNECTION_STRING }}" \
            --set secrets.DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --set secrets.KENOBI_SERVICE_RABBITMQ_HOST="${{ vars.CLOUDAMQP_URI }}" \
            --set secrets.KENOBI_SERVICE_RABBITMQ_PORT="5672" \
            --set secrets.KENOBI_SERVICE_RABBITMQ_USER="${{ secrets.CLOUDAMQP_USER }}" \
            --set secrets.KENOBI_SERVICE_RABBITMQ_PASSWORD="${{ secrets.CLOUDAMQP_PASSWORD }}" \
            --set secrets.KENOBI_SERVICE_RABBITMQ_VHOST="${{ secrets.CLOUDAMQP_USER }}" \
            --set secrets.CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            --set secrets.CLERK_WEBHOOK_SECRET="${{ secrets.CLERK_WEBHOOK_SECRET }}" \
            --set secrets.GITHUB_APP_CLIENT_SECRET="${{ secrets.GH_APP_CLIENT_SECRET }}" \
            --set secrets.GITHUB_APP_PRIVATE_KEY="${{ secrets.GH_APP_PRIVATE_KEY }}" \
            --set secrets.GITHUB_WEBHOOK_SECRET="${{ secrets.GH_WEBHOOK_SECRET }}" \
            --set rabbitmq.auth.username="${{ secrets.CLOUDAMQP_USER }}" \
            --set rabbitmq.auth.passw="${{ secrets.CLOUDAMQP_PASSWORD }}" \
            --set rabbitmq.uri="${{ vars.CLOUDAMQP_URI }}" \
            --set secrets.CLERK_PUBLISHABLE_KEY="${{ vars.CLERK_PUBLISHABLE_KEY }}" \
            --set secrets.CLERK_FRONTEND_DOMAIN="${{ vars.CLERK_FRONTEND_DOMAIN }}" \
            --set secrets.QUERY_AGENT_DB_PASSWORD="${{ secrets.QUERY_AGENT_DB_PASSWORD }}" \
            --set secrets.SLACK_APP_NOTIFICATION_WEBHOOK_URL="${{ secrets.SLACK_APP_NOTIFICATION_WEBHOOK_URL }}" \
            --set secrets.REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --set secrets.LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            --set secrets.LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            --set secrets.STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --set secrets.STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --set secrets.STRIPE_PRICE_ID="${{ vars.STRIPE_PRICE_ID }}" \
            --set secrets.STRIPE_PORTAL_RETURN_URL="${{ vars.STRIPE_PORTAL_RETURN_URL }}" \
            --set secrets.STRIPE_CHECKOUT_SUCCESS_URL="${{ vars.STRIPE_CHECKOUT_SUCCESS_URL }}" \
            --set secrets.STRIPE_CHECKOUT_CANCEL_URL="${{ vars.STRIPE_CHECKOUT_CANCEL_URL }}" \
            --set secrets.INTERNAL_PRO_PLAN_ID="${{ vars.INTERNAL_PRO_PLAN_ID || 'pro' }}" \
            --set secrets.POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}" \
            --set environmentVars.CIU_COST_DOCUMENT_GENERATION="${{ vars.CIU_COST_DOCUMENT_GENERATION }}" \
            --set environmentVars.CIU_COST_WORKFLOW_CREATION="${{ vars.CIU_COST_WORKFLOW_CREATION }}" \
            --set environmentVars.CIU_COST_CHAT_MESSAGE="${{ vars.CIU_COST_CHAT_MESSAGE }}" \
            --set environmentVars.CIU_COST_MCP_MESSAGE="${{ vars.CIU_COST_MCP_MESSAGE }}" \
            --set environmentVars.CIU_COST_INGESTION_PER_LOC="${{ vars.CIU_COST_INGESTION_PER_LOC }}" \
            --set environmentVars.CIU_COST_DEFAULT_INGESTION="${{ vars.CIU_COST_DEFAULT_INGESTION }}" \
            --set environmentVars.USE_DGA_PIPELINE="${{ vars.USE_DGA_PIPELINE || 'false' }}" \
            --wait \
            --timeout 20m

      - name: Dump predeploy-job diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== Jobs in $DEV_NAMESPACE ==="
          kubectl -n "$DEV_NAMESPACE" get jobs
          echo
          echo "=== Pods for predeploy-job ==="
          kubectl -n "$DEV_NAMESPACE" get pods -l job-name=predeploy-job -o wide
          echo
          echo "=== Pod status (last state / reason / exit code — no env) ==="
          kubectl -n "$DEV_NAMESPACE" get pods -l job-name=predeploy-job \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{.status.containerStatuses[*].state}{"\t"}{.status.containerStatuses[*].lastState}{"\n"}{end}'
          echo
          echo "=== predeploy-job logs (all pods, all containers, last 500 lines) ==="
          echo "NOTE: env vars are intentionally not dumped (describe/get yaml skipped)."
          echo "Values sourced from GitHub \`secrets.*\` are auto-masked; \`vars.*\` are not."
          kubectl -n "$DEV_NAMESPACE" logs -l job-name=predeploy-job --tail=500 --all-containers --prefix

      - name: Notify Slack
        if: always()
        uses: crowdbotics/github-actions/slack-notify@master
        with:
          webhook_url: ${{ secrets.ARTIFACT_SLACK_WEBHOOK_URL }}
          title: "Dev snapshot built & deployed: ${{ env.IMAGE_NAME }}"
          emoji: "🧱"
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          fields: |
            Branch tag=${{ steps.tag.outputs.tag }}
            SHA=${{ steps.vars.outputs.sha7 }}
            Image digest=${{ steps.digest.outputs.digest }}

  # ─────────────────────────────────────────────────────────────────────
  # 3b. build-tenant-image-sha — Nuitka tenant build for the sha-tagged
  #     dev image. Same chain pattern as kenobi-c2s today.
  # ─────────────────────────────────────────────────────────────────────
  build-tenant-image-sha:
    needs: build-and-deploy-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TENANT_IMAGE_NAME:   kenobi-c2s-tenant
      ONTENANT_ACR_SERVER: ${{ vars.ONTENANT_ACR_SERVER || 'ontenant.azurecr.io' }}
      TENANT_IMAGE_REPO:   ${{ vars.ONTENANT_ACR_SERVER || 'ontenant.azurecr.io' }}/kenobi-c2s-tenant
      BASE_IMAGE_REF:      ${{ secrets.SHARED_ACR_SERVER }}/kenobi-c2s@${{ needs.build-and-deploy-dev.outputs.image_digest }}
    outputs:
      tenant_digest: ${{ steps.tenant_digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to shared ACR (pull base image)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.SHARED_ACR_SERVER }}
          username: ${{ secrets.SHARED_ACR_USERNAME }}
          password: ${{ secrets.SHARED_ACR_PASSWORD }}

      - name: Login to OnTenant ACR (push tenant image)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ONTENANT_ACR_SERVER }}
          username: ${{ secrets.ONTENANT_ACR_USERNAME }}
          password: ${{ secrets.ONTENANT_ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & Push Tenant Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.tenant
          push: true
          build-args: |
            TENANT_BASE_IMAGE=${{ env.BASE_IMAGE_REF }}
            NUITKA_JOBS=4
            BUILD_PRIORITY=speed
            SKIP_COMPILATION_TEST=true
          tags: |
            ${{ env.TENANT_IMAGE_REPO }}:sha-${{ needs.build-and-deploy-dev.outputs.sha7 }}
            ${{ env.TENANT_IMAGE_REPO }}:${{ needs.build-and-deploy-dev.outputs.branch_tag }}
            ${{ env.TENANT_IMAGE_REPO }}:main
          provenance: false
          cache-from: type=gha,scope=tenant
          cache-to: type=gha,mode=max,scope=tenant

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Copy base image to OnTenant registry
        env:
          BASE_IMAGE_REPO: ${{ env.ONTENANT_ACR_SERVER }}/kenobi-c2s
        run: |
          set -euo pipefail
          echo "Copying base image to OnTenant registry..."
          crane copy "$BASE_IMAGE_REF" "$BASE_IMAGE_REPO:sha-${{ needs.build-and-deploy-dev.outputs.sha7 }}"
          crane copy "$BASE_IMAGE_REF" "$BASE_IMAGE_REPO:${{ needs.build-and-deploy-dev.outputs.branch_tag }}"
          crane copy "$BASE_IMAGE_REF" "$BASE_IMAGE_REPO:main"
          echo "Base image copied successfully"

      - name: Resolve tenant image digest
        id: tenant_digest
        run: |
          DIGEST=$(crane digest "$TENANT_IMAGE_REPO:sha-${{ needs.build-and-deploy-dev.outputs.sha7 }}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always()
        uses: crowdbotics/github-actions/slack-notify@master
        with:
          webhook_url: ${{ secrets.ARTIFACT_SLACK_WEBHOOK_URL }}
          title: "Tenant image (sha) ${{ job.status == 'success' && 'built' || 'failed' }}: ${{ env.TENANT_IMAGE_NAME }}"
          emoji: ${{ job.status == 'success' && '🏢' || '❌' }}
          status: ${{ job.status }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          fields: |
            Base image=sha-${{ needs.build-and-deploy-dev.outputs.sha7 }}
            Branch tag=${{ needs.build-and-deploy-dev.outputs.branch_tag }}
            Tenant digest=${{ steps.tenant_digest.outputs.digest }}
